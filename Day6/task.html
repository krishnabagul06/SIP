<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Card Slider</title>
    <link rel="stylesheet" href="task.css">
</head>
<body>

    <div class="container">

        <!-- Left Side Slider -->
        <div class="slider">

            <img src="image1.jpg" class="card card1">
            <img src="image2.jpg" class="card card2">
            <img src="image3.jpg" class="card active">
            <img src="image4.jpg" class="card card4">
            <img src="image5.jpg" class="card card5">

        </div>

        <!-- Right Side Content -->
        <div class="content">

            <div class="buttons">
                <button id="up">⬆</button>
                <button id="down">⬇</button>
            </div>

            <h1>Luffy Kun</h1>
            <p>MARKETING MANAGER</p>

            <div class="dots">
                <span></span>
                <span></span>
                <span class="active-dot"></span>
                <span></span>
                <span></span>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
